id: regression_loop
name: Regression Verification Loop
type: closed_loop
version: "0.1.0"

goal:
  description: Verify recent changes do not break covered behavior.
  completion:
    - configured_tests_executed
    - critical_and_high_defects_zero_or_waived
    - dashboard_rendered

agents:
  test_runner:
    mode: command
    purpose: Run configured lint, typecheck, unit, and e2e commands.
  verifier:
    mode: read_only
    separate_context: true
    purpose: Interpret failures and decide whether they are regressions, flakes, config issues, or product defects.

steps:
  - id: run_lint
    command: project.commands.lint
    optional: true
  - id: run_typecheck
    command: project.commands.typecheck
    optional: true
  - id: run_unit_tests
    command: project.commands.test
    optional: true
  - id: run_e2e_tests
    command: project.commands.e2e
    optional: true
  - id: classify_failures
    agent: verifier
  - id: update_state
    command: pcl defect open OR pcl defect close
  - id: validate_and_render
    commands:
      - pcl validate
      - pcl render

budget:
  max_iterations: 1
  max_parallel_jobs: 1

stop_conditions:
  - critical_failure_found
  - test_environment_unavailable
  - max_iterations_reached
